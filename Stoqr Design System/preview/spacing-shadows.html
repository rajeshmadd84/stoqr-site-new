<!doctype html>
<!-- @dsCard group="Spacing" name="Shadows & Focus" subtitle="Crisp, low-spread · 3px focus halo" viewport="700x230" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:var(--slate-50);padding:28px">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px">
    <div style="background:#fff;height:90px;border-radius:6px;box-shadow:0 1px 0 rgba(15,23,42,0.04);display:flex;align-items:flex-end;padding:8px"><span class="mono" style="font-size:10px;color:var(--fg-tertiary)">xs</span></div>
    <div style="background:#fff;height:90px;border-radius:6px;box-shadow:0 1px 2px rgba(15,23,42,0.06),0 1px 1px rgba(15,23,42,0.04);display:flex;align-items:flex-end;padding:8px"><span class="mono" style="font-size:10px;color:var(--fg-tertiary)">sm</span></div>
    <div style="background:#fff;height:90px;border-radius:6px;box-shadow:0 4px 8px -2px rgba(15,23,42,0.08),0 2px 4px -2px rgba(15,23,42,0.04);display:flex;align-items:flex-end;padding:8px"><span class="mono" style="font-size:10px;color:var(--fg-tertiary)">md</span></div>
    <div style="background:#fff;height:90px;border-radius:6px;box-shadow:0 12px 24px -8px rgba(15,23,42,0.14),0 4px 8px -4px rgba(15,23,42,0.06);display:flex;align-items:flex-end;padding:8px"><span class="mono" style="font-size:10px;color:var(--fg-tertiary)">lg</span></div>
    <div style="background:#fff;height:90px;border-radius:6px;box-shadow:0 24px 48px -12px rgba(15,23,42,0.20),0 8px 16px -8px rgba(15,23,42,0.08);display:flex;align-items:flex-end;padding:8px"><span class="mono" style="font-size:10px;color:var(--fg-tertiary)">xl</span></div>
  </div>
  <div style="display:flex;gap:10px;margin-top:18px;align-items:center">
    <button style="background:#2563EB;color:#fff;border:none;padding:8px 14px;border-radius:6px;box-shadow:0 0 0 3px rgba(37,99,235,0.28);font:600 13px var(--font-mono)">Focused</button>
    <span class="label-xs">3px halo · rgba(37,99,235,0.28)</span>
  </div>
</div></body></html>
