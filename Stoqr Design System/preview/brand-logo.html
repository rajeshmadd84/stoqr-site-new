<!doctype html>
<!-- @dsCard group="Brand" name="Logo" subtitle="Primary lockup, mono variants, mark on brand" viewport="700x260" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex;align-items:center;justify-content:center;background:#F5F7FB;padding:28px;border-radius:6px;border:1px solid var(--border-subtle)">
    <img src="../assets/stoqr-logo.svg" style="height:64px;display:block" alt="Stoqr"/>
  </div>
  <div style="display:flex;gap:10px;margin-top:12px">
    <div style="flex:1;display:flex;align-items:center;justify-content:center;background:var(--slate-900);padding:18px;border-radius:6px">
      <img src="../assets/stoqr-logo-mono-white.svg" style="height:36px;display:block" alt=""/>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--border-subtle);padding:18px;border-radius:6px">
      <img src="../assets/stoqr-logo-mono-ink.svg" style="height:36px;display:block" alt=""/>
    </div>
    <div style="width:120px;display:flex;align-items:center;justify-content:center;background:var(--brand-blue);padding:18px;border-radius:6px">
      <img src="../assets/stoqr-mark.svg" style="height:48px;filter:brightness(0) invert(1);display:block" alt=""/>
    </div>
  </div>
</div></body></html>
