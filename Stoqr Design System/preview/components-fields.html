<!doctype html>
<!-- @dsCard group="Components" name="Form Fields" subtitle="Inputs, focus, error, select, toggles" viewport="700x210" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script></head>
<body><div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div>
      <label style="font-size:12px;font-weight:500;color:var(--fg-secondary);display:block;margin-bottom:6px">SKU</label>
      <div style="position:relative">
        <i data-lucide="search" style="width:14px;height:14px;position:absolute;left:10px;top:11px;color:var(--fg-tertiary)"></i>
        <input value="SKU-049281-NV" style="width:100%;height:36px;padding:0 10px 0 30px;border:1px solid var(--border-default);border-radius:6px;font:500 13px 'Geist Mono',monospace;background:#fff"/>
      </div>
    </div>
    <div>
      <label style="font-size:12px;font-weight:500;color:var(--fg-secondary);display:block;margin-bottom:6px">Quantity</label>
      <input value="1240" style="width:100%;height:36px;padding:0 10px;border:2px solid #2563EB;border-radius:6px;font:500 13px var(--font-mono);outline:none;box-shadow:0 0 0 3px rgba(37,99,235,0.28)"/>
    </div>
    <div>
      <label style="font-size:12px;font-weight:500;color:var(--fg-secondary);display:block;margin-bottom:6px">Warehouse</label>
      <div style="height:36px;padding:0 10px;border:1px solid var(--border-default);border-radius:6px;font:500 13px var(--font-mono);background:#fff;display:flex;align-items:center;justify-content:space-between">
        W-02 · Houston North <i data-lucide="chevron-down" style="width:14px;height:14px;color:var(--fg-tertiary)"></i>
      </div>
    </div>
    <div>
      <label style="font-size:12px;font-weight:500;color:var(--fg-secondary);display:block;margin-bottom:6px">Reason</label>
      <div style="height:36px;padding:0 10px;border:1px solid #DC2626;border-radius:6px;background:#FEE2E2;display:flex;align-items:center;color:#991B1B;font-size:13px"><i data-lucide="alert-circle" style="width:14px;height:14px;margin-right:6px"></i>Required</div>
    </div>
  </div>
  <div style="display:flex;gap:14px;margin-top:14px;align-items:center">
    <label style="display:flex;align-items:center;gap:8px;font-size:13px"><input type="checkbox" checked style="width:16px;height:16px;accent-color:#2563EB"/>Auto-approve</label>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px"><input type="radio" name="r" checked style="accent-color:#2563EB"/>System</label>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px"><input type="radio" name="r" style="accent-color:#2563EB"/>Manual</label>
    <div style="position:relative;width:36px;height:20px;background:#2563EB;border-radius:9999px"><div style="position:absolute;right:2px;top:2px;width:16px;height:16px;background:#fff;border-radius:9999px"></div></div>
  </div>
  <script>lucide.createIcons();</script>
</div></body></html>
