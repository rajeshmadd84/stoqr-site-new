<!doctype html>
<!-- @dsCard group="Components" name="Badges & Pills" subtitle="Status pills + mono chips + deltas" viewport="700x140" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script></head>
<body><div class="card">
  <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
    <span style="display:inline-flex;align-items:center;gap:5px;background:#DCFCE7;border:1px solid #86EFAC;color:#166534;padding:3px 9px;border-radius:9999px;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase"><span style="width:6px;height:6px;background:#16A34A;border-radius:9999px"></span>In stock</span>
    <span style="display:inline-flex;align-items:center;gap:5px;background:#FEF3C7;border:1px solid #FCD34D;color:#854D0E;padding:3px 9px;border-radius:9999px;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase"><span style="width:6px;height:6px;background:#D97706;border-radius:9999px"></span>Low</span>
    <span style="display:inline-flex;align-items:center;gap:5px;background:#FEE2E2;border:1px solid #FCA5A5;color:#991B1B;padding:3px 9px;border-radius:9999px;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase"><span style="width:6px;height:6px;background:#DC2626;border-radius:9999px"></span>Out</span>
    <span style="display:inline-flex;align-items:center;gap:5px;background:#CFFAFE;border:1px solid #67E8F9;color:#155E75;padding:3px 9px;border-radius:9999px;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase"><i data-lucide="truck" style="width:11px;height:11px"></i>In transit</span>
    <span style="display:inline-flex;align-items:center;gap:5px;background:#EDE9FE;border:1px solid #C4B5FD;color:#5B21B6;padding:3px 9px;border-radius:9999px;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase"><i data-lucide="sparkles" style="width:11px;height:11px"></i>Atlas</span>
    <span style="display:inline-flex;align-items:center;gap:5px;background:var(--slate-100);border:1px solid var(--slate-200);color:var(--slate-700);padding:3px 9px;border-radius:9999px;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase">Draft</span>
  </div>
  <div style="display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap">
    <span style="background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE;padding:2px 8px;border-radius:4px;font-family:'Geist Mono',monospace;font-size:11px">SKU-049281</span>
    <span style="background:var(--slate-100);color:var(--slate-700);padding:2px 8px;border-radius:4px;font-family:'Geist Mono',monospace;font-size:11px">A-12-03</span>
    <span style="background:var(--slate-100);color:var(--slate-700);padding:2px 8px;border-radius:4px;font-family:'Geist Mono',monospace;font-size:11px">W-02</span>
    <span style="display:inline-flex;align-items:center;gap:4px;background:#16A34A;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums">+12</span>
    <span style="display:inline-flex;align-items:center;gap:4px;background:#DC2626;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums">−4</span>
  </div>
  <script>lucide.createIcons();</script>
</div></body></html>
