<!doctype html>
<!-- @dsCard group="Components" name="Cards" subtitle="Standard surface + agent suggestion" viewport="700x200" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script></head>
<body><div class="card" style="padding:0">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:20px">
    <!-- Standard card -->
    <div style="background:#fff;border:1px solid var(--border-subtle);border-radius:6px;box-shadow:0 1px 0 rgba(15,23,42,0.04);overflow:hidden">
      <div style="padding:12px 14px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between">
        <div style="font-weight:600;font-size:14px">Bin A-12-03</div>
        <div style="font-size:11px;color:var(--fg-tertiary)">Updated 2m ago</div>
      </div>
      <div style="padding:12px 14px">
        <div style="font-family:'Geist Mono',monospace;font-size:12px;color:var(--fg-secondary);margin-bottom:6px">SKU-049281-NV</div>
        <div style="font-size:24px;font-weight:600;font-variant-numeric:tabular-nums">1,240 <span style="font-size:12px;font-weight:500;color:var(--fg-tertiary)">units</span></div>
      </div>
    </div>
    <!-- Agent card -->
    <div style="background:linear-gradient(180deg,#FAF5FF,#fff);border:1px solid #C4B5FD;border-radius:6px;overflow:hidden">
      <div style="padding:12px 14px;display:flex;align-items:center;gap:8px">
        <div style="width:24px;height:24px;border-radius:6px;background:#7C3AED;display:flex;align-items:center;justify-content:center"><i data-lucide="sparkles" style="width:12px;height:12px;color:#fff"></i></div>
        <div style="font-weight:600;font-size:13px">Atlas suggests</div>
        <div style="margin-left:auto;font-family:'Geist Mono',monospace;font-size:10px;color:#7C3AED">94% conf</div>
      </div>
      <div style="padding:0 14px 12px">
        <div style="font-size:13px;color:var(--fg-primary);line-height:1.45">Transfer 240 units from W-02 to W-04 — based on 30-day demand.</div>
        <div style="display:flex;gap:6px;margin-top:10px">
          <button style="background:#7C3AED;color:#fff;border:none;padding:6px 10px;border-radius:5px;font:600 11px var(--font-mono)">Approve</button>
          <button style="background:#fff;border:1px solid var(--border-default);padding:6px 10px;border-radius:5px;font:600 11px var(--font-mono)">Adjust</button>
          <button style="background:transparent;border:none;padding:6px 8px;font:600 11px var(--font-mono);color:var(--fg-secondary)">Decline</button>
        </div>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</div></body></html>
