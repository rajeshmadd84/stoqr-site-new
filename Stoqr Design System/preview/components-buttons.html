<!doctype html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary, secondary, ghost, destructive, agent" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script></head>
<body><div class="card">
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
    <button style="background:#2563EB;color:#fff;border:none;padding:0 14px;height:36px;border-radius:6px;font:600 13px var(--font-mono);box-shadow:inset 0 1px 0 rgba(255,255,255,0.18);display:flex;align-items:center;gap:6px;cursor:pointer"><i data-lucide="package-plus" style="width:14px;height:14px"></i>Receive shipment</button>
    <button style="background:#1E40AF;color:#fff;border:none;padding:0 14px;height:36px;border-radius:6px;font:600 13px var(--font-mono)">Hover</button>
    <button style="background:#fff;color:var(--fg-primary);border:1px solid var(--border-default);padding:0 14px;height:36px;border-radius:6px;font:600 13px var(--font-mono)">Secondary</button>
    <button style="background:transparent;color:var(--fg-primary);border:none;padding:0 12px;height:36px;border-radius:6px;font:600 13px var(--font-mono)">Ghost</button>
    <button style="background:#DC2626;color:#fff;border:none;padding:0 14px;height:36px;border-radius:6px;font:600 13px var(--font-mono)">Destructive</button>
    <button disabled style="background:var(--slate-100);color:var(--fg-muted);border:1px solid var(--border-subtle);padding:0 14px;height:36px;border-radius:6px;font:600 13px var(--font-mono)">Disabled</button>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px">
    <button style="background:#2563EB;color:#fff;border:none;padding:0 18px;height:44px;border-radius:6px;font:600 15px var(--font-mono)">Large</button>
    <button style="background:#2563EB;color:#fff;border:none;padding:0 12px;height:32px;border-radius:6px;font:600 12px var(--font-mono)">Default</button>
    <button style="background:#2563EB;color:#fff;border:none;padding:0 10px;height:26px;border-radius:5px;font:600 11px var(--font-mono)">Small</button>
    <button style="width:36px;height:36px;background:#fff;border:1px solid var(--border-default);border-radius:6px;display:flex;align-items:center;justify-content:center"><i data-lucide="more-horizontal" style="width:16px;height:16px"></i></button>
    <button style="background:linear-gradient(180deg,#7C3AED,#6D28D9);color:#fff;border:none;padding:0 14px;height:36px;border-radius:6px;font:600 13px var(--font-mono);display:flex;align-items:center;gap:6px"><i data-lucide="sparkles" style="width:14px;height:14px"></i>Run agent</button>
  </div>
  <script>lucide.createIcons();</script>
</div></body></html>
