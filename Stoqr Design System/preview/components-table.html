<!doctype html>
<!-- @dsCard group="Components" name="Tables" subtitle="Dense ops table · selected row · deltas" viewport="700x210" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script></head>
<body><div class="card" style="padding:0">
  <div style="background:#fff;border:1px solid var(--border-subtle);border-radius:6px;margin:18px;overflow:hidden;font-variant-numeric:tabular-nums">
    <div style="display:grid;grid-template-columns:120px 1fr 90px 100px 90px;padding:8px 14px;background:var(--slate-50);border-bottom:1px solid var(--border-subtle);font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-tertiary)">
      <div>SKU</div><div>Description</div><div style="text-align:right">On hand</div><div style="text-align:right">Δ 7d</div><div style="text-align:right">Status</div>
    </div>
    <div style="display:grid;grid-template-columns:120px 1fr 90px 100px 90px;padding:9px 14px;border-bottom:1px solid var(--border-subtle);font-size:13px;align-items:center">
      <div style="font-family:'Geist Mono',monospace;font-size:12px">SKU-049281</div>
      <div>Navigator backpack 30L</div>
      <div style="text-align:right;font-weight:500">1,240</div>
      <div style="text-align:right;color:#16A34A">+128</div>
      <div style="text-align:right"><span style="display:inline-flex;align-items:center;gap:4px;background:#DCFCE7;color:#166534;padding:2px 7px;border-radius:9999px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em"><span style="width:5px;height:5px;background:#16A34A;border-radius:9999px"></span>OK</span></div>
    </div>
    <div style="display:grid;grid-template-columns:120px 1fr 90px 100px 90px;padding:9px 14px;border-bottom:1px solid var(--border-subtle);font-size:13px;align-items:center;background:var(--slate-50);border-left:2px solid #2563EB">
      <div style="font-family:'Geist Mono',monospace;font-size:12px">SKU-049282</div>
      <div>Navigator backpack 45L</div>
      <div style="text-align:right;font-weight:500">42</div>
      <div style="text-align:right;color:#DC2626">−86</div>
      <div style="text-align:right"><span style="display:inline-flex;align-items:center;gap:4px;background:#FEF3C7;color:#854D0E;padding:2px 7px;border-radius:9999px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em"><span style="width:5px;height:5px;background:#D97706;border-radius:9999px"></span>Low</span></div>
    </div>
    <div style="display:grid;grid-template-columns:120px 1fr 90px 100px 90px;padding:9px 14px;font-size:13px;align-items:center">
      <div style="font-family:'Geist Mono',monospace;font-size:12px">SKU-051104</div>
      <div>Trail bottle 750ml — slate</div>
      <div style="text-align:right;font-weight:500;color:var(--fg-tertiary)">0</div>
      <div style="text-align:right;color:var(--fg-tertiary)">—</div>
      <div style="text-align:right"><span style="display:inline-flex;align-items:center;gap:4px;background:#FEE2E2;color:#991B1B;padding:2px 7px;border-radius:9999px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em"><span style="width:5px;height:5px;background:#DC2626;border-radius:9999px"></span>Out</span></div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</div></body></html>
