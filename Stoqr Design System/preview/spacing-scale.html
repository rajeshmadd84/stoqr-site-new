<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing Scale" subtitle="4px base · 1–20" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div id="r" style="display:flex;align-items:flex-end;gap:6px"></div>
  <script>
    const tokens = [['1','4'],['2','8'],['3','12'],['4','16'],['5','20'],['6','24'],['8','32'],['10','40'],['12','48'],['16','64'],['20','80']];
    document.getElementById('r').innerHTML = tokens.map(([t,px])=>`
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1">
        <div style="width:100%;height:${Math.min(px,80)}px;background:#2563EB;border-radius:3px"></div>
        <div style="font-size:11px;font-weight:600">${t}</div>
        <div class="mono" style="font-size:9px;color:var(--fg-tertiary)">${px}px</div>
      </div>
    `).join('');
  </script>
</div></body></html>
