<!doctype html>
<!-- @dsCard group="Colors" name="Brand Colors" subtitle="Brand blue family + sanctioned gradient" viewport="700x210" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:8px">
    <div style="background:#2563EB;color:#fff;padding:16px;border-radius:6px;height:120px;display:flex;flex-direction:column;justify-content:space-between">
      <div class="label-xs" style="color:rgba(255,255,255,0.7)">Brand / Primary</div>
      <div>
        <div style="font-family:var(--font-display);font-weight:700;font-size:18px">Brand Blue</div>
        <div class="mono" style="font-size:11px;opacity:0.8">#2563EB</div>
      </div>
    </div>
    <div style="background:#1D97FF;color:#fff;padding:16px;border-radius:6px;height:120px;display:flex;flex-direction:column;justify-content:space-between">
      <div class="label-xs" style="color:rgba(255,255,255,0.7)">Accent</div>
      <div>
        <div style="font-weight:600;font-size:14px">Bright</div>
        <div class="mono" style="font-size:11px;opacity:0.85">#1D97FF</div>
      </div>
    </div>
    <div style="background:#1E40AF;color:#fff;padding:16px;border-radius:6px;height:120px;display:flex;flex-direction:column;justify-content:space-between">
      <div class="label-xs" style="color:rgba(255,255,255,0.7)">Pressed</div>
      <div>
        <div style="font-weight:600;font-size:14px">Deep</div>
        <div class="mono" style="font-size:11px;opacity:0.85">#1E40AF</div>
      </div>
    </div>
  </div>
  <div style="margin-top:8px;display:flex;gap:8px">
    <div style="flex:1;height:48px;background:#0B2C7A;border-radius:6px;display:flex;align-items:center;padding:0 14px;color:#fff"><span class="mono" style="font-size:11px;opacity:0.85">#0B2C7A&nbsp;·&nbsp;Ink</span></div>
    <div style="flex:1;height:48px;background:linear-gradient(90deg,#2563EB 0%,#1E40AF 100%);border-radius:6px;display:flex;align-items:center;padding:0 14px;color:#fff"><span class="mono" style="font-size:11px;opacity:0.95">Sanctioned brand gradient (sparingly)</span></div>
  </div>
</div></body></html>
