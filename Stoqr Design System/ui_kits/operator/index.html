<!doctype html>
<!-- @dsCard group="UI Kit — Operator" name="Operator UI Kit" subtitle="Operator app · sidebar, topbar, dashboard, agent drawer" viewport="1280x820" -->
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Stoqr · Operator</title>
  <link rel="stylesheet" href="../../colors_and_type.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="OverviewPage.jsx"></script>
  <script type="text/babel" src="InventoryPage.jsx"></script>
  <script type="text/babel" src="CycleCountsPage.jsx"></script>
  <script type="text/babel" src="WorkflowsPage.jsx"></script>
  <script type="text/babel" src="MorePages.jsx"></script>
  <script type="text/babel">
    function App() {
      const [page, setPage] = React.useState('overview');
      const [agentOpen, setAgentOpen] = React.useState(false);

      React.useEffect(() => { lucide.createIcons(); }, [page, agentOpen]);

      const titles = {
        overview: ['Overview'],
        inventory: ['Inventory'],
        movements: ['Movements'],
        'cycle-counts': ['Cycle counts'],
        approvals: ['Approvals'],
        workflows: ['Workflows', 'Auto-replenish low stock'],
        agents: ['Agents'],
        warehouses: ['Warehouses'],
        team: ['Team'],
        settings: ['Settings'],
      };
      const crumbs = titles[page] || [page];
      const last = crumbs[crumbs.length - 1];
      const earlier = crumbs.slice(0, -1);

      let body;
      if (page === 'overview') body = <OverviewPage onOpenAgent={() => setAgentOpen(true)} />;
      else if (page === 'inventory') body = <InventoryPage />;
      else if (page === 'cycle-counts') body = <CycleCountsPage />;
      else if (page === 'workflows') body = <WorkflowsPage />;
      else if (page === 'movements') body = <MovementsPage />;
      else if (page === 'approvals') body = <ApprovalsPage />;
      else if (page === 'agents') body = <AgentsPage />;
      else if (page === 'warehouses') body = <WarehousesPage />;
      else if (page === 'team') body = <TeamPage />;
      else if (page === 'settings') body = <SettingsPage />;
      else body = <Empty title={last} />;

      return (
        <div style={{ display: 'flex', minHeight: '100vh', background: 'var(--bg-canvas)' }}>
          <Sidebar active={page} onNav={setPage} />
          <main style={{ flex: 1, minWidth: 0 }}>
            <Topbar title={last} breadcrumbs={earlier} onAgentToggle={() => setAgentOpen(o => !o)} />
            {body}
          </main>
          {agentOpen && <AgentDrawer onClose={() => setAgentOpen(false)} />}
        </div>
      );
    }

    function Empty({ title }) {
      return (
        <div style={{ padding: 60, textAlign: 'center', color: 'var(--fg-tertiary)' }}>
          <div style={{ width: 56, height: 56, margin: '0 auto 12px', borderRadius: 8, background: 'var(--slate-100)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <i data-lucide="construction" style={{ width: 24, height: 24 }}></i>
          </div>
          <div style={{ fontWeight: 600, fontSize: 16, color: 'var(--fg-primary)' }}>{title}</div>
          <div style={{ fontSize: 13, marginTop: 4 }}>Not implemented in this kit. Use the components in this folder to compose.</div>
        </div>
      );
    }

    function AgentDrawer({ onClose }) {
      return (
        <div style={{ position: 'fixed', right: 12, bottom: 12, top: 70, width: 380, background: '#fff', border: '1px solid var(--border-subtle)', borderRadius: 8, boxShadow: '0 24px 48px -12px rgba(15,23,42,0.20),0 8px 16px -8px rgba(15,23,42,0.08)', display: 'flex', flexDirection: 'column', zIndex: 100 }}>
          <div style={{ padding: '12px 14px', borderBottom: '1px solid var(--border-subtle)', display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 24, height: 24, borderRadius: 6, background: 'linear-gradient(180deg,#7C3AED,#6D28D9)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <i data-lucide="sparkles" style={{ width: 12, height: 12, color: '#fff' }}></i>
            </div>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600 }}>Atlas</div>
              <div style={{ fontSize: 11, color: 'var(--fg-tertiary)' }}>Operations agent · v2.4</div>
            </div>
            <button onClick={onClose} style={{ marginLeft: 'auto', width: 26, height: 26, border: 'none', background: 'transparent', cursor: 'pointer', borderRadius: 5 }}>
              <i data-lucide="x" style={{ width: 14, height: 14 }}></i>
            </button>
          </div>
          <div style={{ flex: 1, padding: 14, overflowY: 'auto' }}>
            <div style={{ background: '#FAF5FF', border: '1px solid #C4B5FD', borderRadius: 6, padding: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#7C3AED', marginBottom: 4 }}>Suggestion · 94% confidence</div>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Transfer 240 units · W-02 → W-04</div>
              <div style={{ fontSize: 12, color: 'var(--fg-secondary)', lineHeight: 1.5 }}>30-day demand at W-04 has grown 18%. W-02 carries 4.3× safety stock. Transferring 240 units of <span style={{ fontFamily: 'Geist Mono' }}>SKU-049281-NV</span> reduces holding cost without affecting fill rate.</div>
              <div style={{ display: 'flex', gap: 6, marginTop: 10 }}>
                <button style={{ background: '#7C3AED', color: '#fff', border: 'none', padding: '6px 10px', borderRadius: 5, fontWeight: 600, fontSize: 12, cursor: 'pointer' }}>Approve & post</button>
                <button style={{ background: '#fff', border: '1px solid var(--border-default)', padding: '6px 10px', borderRadius: 5, fontWeight: 600, fontSize: 12, cursor: 'pointer' }}>Adjust</button>
                <button style={{ background: 'transparent', border: 'none', padding: '6px 8px', fontWeight: 600, fontSize: 12, color: 'var(--fg-secondary)', cursor: 'pointer' }}>Decline</button>
              </div>
            </div>
            <div style={{ marginTop: 14, fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--fg-tertiary)' }}>Recent runs</div>
            <RunRow t="4:14 PM" title="Recount bin A-12-03" status="running" />
            <RunRow t="3:02 PM" title="Replenish zone D · 4 bins" status="done" />
            <RunRow t="1:48 PM" title="Close cycle count #2841" status="done" />
            <RunRow t="11:22 AM" title="Auto-route inbound dock 3" status="done" />
          </div>
          <div style={{ padding: 10, borderTop: '1px solid var(--border-subtle)' }}>
            <div style={{ position: 'relative' }}>
              <input placeholder="Ask Atlas to do something…" style={{ width: '100%', height: 36, padding: '0 38px 0 12px', border: '1px solid var(--border-default)', borderRadius: 6, fontSize: 13, fontFamily: 'inherit' }} />
              <button style={{ position: 'absolute', right: 4, top: 4, width: 28, height: 28, background: '#7C3AED', color: '#fff', border: 'none', borderRadius: 5, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                <i data-lucide="arrow-up" style={{ width: 14, height: 14 }}></i>
              </button>
            </div>
          </div>
        </div>
      );
    }

    function RunRow({ t, title, status }) {
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 0', borderBottom: '1px solid var(--border-subtle)' }}>
          <div style={{ width: 8, height: 8, borderRadius: 9999, background: status === 'running' ? '#7C3AED' : '#16A34A', boxShadow: status === 'running' ? '0 0 0 3px rgba(124,58,237,0.18)' : 'none' }}></div>
          <div style={{ flex: 1, minWidth: 0, fontSize: 12, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{title}</div>
          <div style={{ fontSize: 11, fontFamily: 'Geist Mono', color: 'var(--fg-tertiary)' }}>{t}</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
