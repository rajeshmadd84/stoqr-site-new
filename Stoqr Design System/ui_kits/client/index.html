<!doctype html>
<!-- @dsCard group="UI Kit — Client" name="Client UI Kit" subtitle="Tenant-facing app · overview, stats, action queue" viewport="1280x820" -->
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Stoqr · Client</title>
  <link rel="stylesheet" href="../../colors_and_type.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>body{margin:0}button{font-family:inherit}</style>
</head>
<body>
  <div id="root"></div>
  <!-- We reuse Button + Card from operator -->
  <script type="text/babel" src="../operator/Shell.jsx"></script>
  <script type="text/babel" src="ClientShell.jsx"></script>
  <script type="text/babel" src="ClientPages.jsx"></script>
  <script type="text/babel" src="MoreClientPages.jsx"></script>
  <script type="text/babel">
    function App() {
      const [page, setPage] = React.useState('home');
      const [requestOpen, setRequestOpen] = React.useState(false);
      const [toast, setToast] = React.useState(null);

      React.useEffect(() => { lucide.createIcons(); }, [page, requestOpen, toast]);

      const submit = () => {
        setRequestOpen(false);
        setToast('Request submitted. Atlas will route it for approval.');
        setTimeout(() => setToast(null), 3000);
      };

      return (
        <div style={{ background: 'var(--bg-canvas)', minHeight: '100vh' }}>
          <ClientTopbar active={page} onNav={setPage} />
          {page === 'home' && <ClientOverview onRequest={() => setRequestOpen(true)} />}
          {page === 'inventory' && <ClientInventoryPage />}
          {page === 'requests' && <ClientRequestsPage onNewRequest={() => setRequestOpen(true)} />}
          {page === 'approvals' && <ClientApprovalsPage />}
          {page === 'history' && <ClientHistoryPage />}
          {requestOpen && <ClientRequest onSubmit={submit} onClose={() => setRequestOpen(false)} />}
          {toast && (
            <div style={{ position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)', background: 'var(--slate-900)', color: '#fff', padding: '10px 16px', borderRadius: 6, fontSize: 13, display: 'flex', alignItems: 'center', gap: 8, boxShadow: '0 12px 24px -8px rgba(15,23,42,0.4)' }}>
              <i data-lucide="check-circle-2" style={{ width: 14, height: 14, color: '#86EFAC' }}></i>
              {toast}
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
